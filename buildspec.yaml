version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 10
    commands:
      - echo Installing dependencies...
      - npm install
  build:
    commands:
      - echo Build started on `date`
      - npm run build
  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'

cache:
  paths:
    - node_modules/**/*

# Added `build` command to ensure a valid CodeBuild project is executed for the pipeline.
# This change addresses the unknown 'build' action issue by explicitly defining it.